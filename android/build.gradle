// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        kotlinVersion = '2.0.20'
        agpVersion = '8.4.0'
        // Set the package name at root level
        androidPackageName = 'com.anonymous.mobileapp'
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:$agpVersion")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
        // Force community autolinking (fixes the "extensions" error)
        classpath("expo.modules:expo-modules-autolinking:1.5.0")
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url 'https://www.jitpack.io' }
    }
    // Pass the package name to each subproject
    project.ext {
        packageName = rootProject.ext.androidPackageName
    }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"